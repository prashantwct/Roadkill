{% extends "base.html" %}
{% block content %}

<link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

<div class="row justify-content-center mt-3">
  <div class="col-lg-8">
    <div class="card shadow-sm p-4">

      <h3 class="mb-3">
        <i class="fa-solid fa-pen-to-square me-2"></i>
        Edit Encounter Record {{ c.code }}
      </h3>

      <form method="POST">

        <div class="mb-3">
          <label for="encounter_type" class="form-label fw-bold">Encounter / Incident Type</label>
          <select class="form-select" id="encounter_type" name="encounter_type" required>
            <option value="Roadkill" {% if c.encounter_type == 'Roadkill' %}selected{% endif %}>🚗 Roadkill</option>
            <option value="Opportunistic Mortality" {% if c.encounter_type == 'Opportunistic Mortality' %}selected{% endif %}>💀 Opportunistic Mortality (Found Dead)</option>
            <option value="Rescue / Live Animal" {% if c.encounter_type == 'Rescue / Live Animal' %}selected{% endif %}>🐾 Rescue / Live Animal</option>
            <option value="Active Surveillance" {% if c.encounter_type == 'Active Surveillance' %}selected{% endif %}>🔬 Active Surveillance (Captured & Released)</option>
            <option value="Other" {% if c.encounter_type == 'Other' %}selected{% endif %}>❓ Other</option>
          </select>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Animal Type</label>
            <select name="animal_type" id="animalType" class="form-select" onchange="updateSpeciesOptions()">
              <option value="Unknown" {% if c.animal_type == 'Unknown' %}selected{% endif %}>Unknown</option>
              <option value="Wild Animal" {% if c.animal_type == 'Wild Animal' %}selected{% endif %}>Wild Animal</option>
              <option value="Domestic Animal" {% if c.animal_type == 'Domestic Animal' %}selected{% endif %}>Domestic Animal</option>
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Species</label>
            
            <select name="species_select" id="speciesSelect" class="form-select" placeholder="Search for species..."></select>
            
            <div id="speciesCustomDiv" class="mt-2" style="display:none;">
              <input name="species_custom" id="speciesCustomInput" class="form-control" placeholder="Type species name...">
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-6 mb-3">
             <label class="form-label fw-bold">Latitude</label>
             <input name="latitude" class="form-control" value="{{ c.latitude }}">
          </div>
          <div class="col-6 mb-3">
             <label class="form-label fw-bold">Longitude</label>
             <input name="longitude" class="form-control" value="{{ c.longitude }}">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Notes</label>
          <textarea name="notes" class="form-control" rows="3">{{ c.notes }}</textarea>
        </div>

        <button class="btn btn-success w-100">
          <i class="fa-solid fa-check me-1"></i> Update Record
        </button>
        <a href="{{ url_for('view_carcass', carcass_id=c.id) }}" class="btn btn-link w-100 mt-2">Cancel</a>
      </form>

    </div>
  </div>
</div>

<script>
const speciesMap = {
  "Wild Animal": [
    "Barking Deer (Muntjac)", "Barasingha (Swamp Deer)", "Blackbuck", "Chinkara (Indian Gazelle)",
    "Chital (Spotted Deer)", "Civet (Asian Palm / Small Indian)", "Dhole (Wild Dog)", 
    "Four-horned Antelope (Chousingha)", "Gaur (Indian Bison)", "Golden Jackal", 
    "Gray Langur (Hanuman Langur)", "Honey Badger (Ratel)", "Indian Boar (Wild Boar)", 
    "Indian Crested Porcupine", "Indian Fox", "Indian Hare", "Indian Pangolin", 
    "Indian Wolf", "Jungle Cat", "Leopard", "Mongoose", "Monitor Lizard", 
    "Nilgai (Blue Bull)", "Peafowl", "Rhesus Macaque", "Rusty-spotted Cat", 
    "Sambar Deer", "Sloth Bear", "Snake (Non-Venomous)", "Snake (Venomous)", 
    "Striped Hyena", "Tiger", "Turtle / Tortoise", "Other"
  ],
  "Domestic Animal": [
    "Buffalo (Water Buffalo)", "Cat", "Cattle (Cow / Bull)", "Dog", "Donkey / Horse", 
    "Goat", "Pig", "Poultry / Fowl", "Sheep", "Other"
  ],
  "Unknown": ["Unknown", "Other"]
};

let speciesTomSelect = null;

function updateSpeciesOptions() {
  const typeSelect = document.getElementById('animalType');
  const type = typeSelect.value;
  const options = speciesMap[type] || ["Unknown", "Other"];
  const selectEl = document.getElementById('speciesSelect');

  if (speciesTomSelect) {
    speciesTomSelect.destroy();
  }

  selectEl.innerHTML = "";
  options.forEach(opt => {
    const el = document.createElement("option");
    el.value = opt;
    el.textContent = opt;
    selectEl.appendChild(el);
  });
  
  speciesTomSelect = new TomSelect("#speciesSelect", {
    create: false,
    sortField: { field: "text", direction: "asc" }
  });

  speciesTomSelect.on('change', function() {
    checkSpeciesOther();
  });

  checkSpeciesOther();
}

function checkSpeciesOther() {
  const selectVal = document.getElementById('speciesSelect').value;
  const customDiv = document.getElementById('speciesCustomDiv');
  const customInput = document.getElementById('speciesCustomInput');

  if (selectVal === 'Other') {
    customDiv.style.display = 'block';
    customInput.required = true;
  } else {
    customDiv.style.display = 'none';
    customInput.required = false;
  }
}

document.addEventListener("DOMContentLoaded", function() {
  const savedSpecies = "{{ c.species }}";
  
  // Load standard options based on saved animal_type
  updateSpeciesOptions();
  
  if (savedSpecies && savedSpecies !== 'None') {
    // Check if the saved species exists in our new searchable list
    const hasOption = Object.values(speciesTomSelect.options).some(opt => opt.value === savedSpecies);
    
    if (hasOption) {
      // It exists! Select it in the search box
      speciesTomSelect.setValue(savedSpecies);
    } else {
      // It was a custom entry previously. Select 'Other' and fill the text box.
      speciesTomSelect.setValue('Other');
      document.getElementById('speciesCustomInput').value = savedSpecies;
    }
  }
});
</script>
{% endblock %}
